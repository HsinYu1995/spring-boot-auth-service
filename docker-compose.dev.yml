services:
  auth-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_URL=jdbc:postgresql://postgres:5432/authdb
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_PRIVATE_KEY_PATH=file:/run/secrets/private.pem
      - JWT_PUBLIC_KEY_PATH=file:/run/secrets/public.pem
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
      - APP_BASE_URL=http://localhost:5173
      - CORS_ALLOWED_ORIGIN=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src/main/resources/keys/private.pem:/run/secrets/private.pem:ro
      - ./src/main/resources/keys/public.pem:/run/secrets/public.pem:ro

  tinder-app:
    build:
      context: ../../js/react/tinder-app
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ../../js/react/tinder-app/src:/app/src
    environment:
      - API_PROXY_TARGET=http://auth-service:8080

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
